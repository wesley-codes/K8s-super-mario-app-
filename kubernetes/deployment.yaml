apiVersion: apps/v1
kind: Deployment
metadata:
  name: mario-app-deployment
  namespace: m-cluster
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mario-app
  template:
    metadata:
      labels:
        app: mario-app
        version: v1             
    spec:
      restartPolicy: Always              
      terminationGracePeriodSeconds: 30  
      dnsPolicy: ClusterFirst            
      securityContext:
        runAsNonRoot: true       
        runAsUser: 1000
        fsGroup: 200
      containers:
        - name: mario-container
          image: sevenajay/mario:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              port: http
              path: /
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              port: http
              path: /
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL