apiVersion: v1
kind: Service
metadata:
  name: mario-app-service
  namespace: m-cluster
  labels:
    app: mario-app
    version: v1
spec:                            
  type: LoadBalancer
  sessionAffinity: None
  externalTrafficPolicy: Local
  selector:
    app: mario-app
    version: v1
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http          